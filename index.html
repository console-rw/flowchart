<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recruitment Flowchart</title>

<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #eef2f7, #d9e4f5);
        text-align: center;
        margin: 0;
        padding: 20px;
    }

    h1 {
        margin-bottom: 30px;
        color: #333;
    }

    .flowchart {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        gap: 15px;
        max-width: 1100px;
        margin: auto;
    }

    .step {
        display: flex;
        align-items: center;
    }

    .box {
        width: 160px;
        height: 90px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: bold;
        text-align: center;
        padding: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    .hr { background: #6c5ce7; }
    .job { background: #0984e3; }
    .candidate { background: #00b894; }
    .application { background: #fdcb6e; color: #333; }
    .screening { background: #e17055; }
    .interview { background: #00cec9; }
    .offer { background: #2ecc71; }
    .reject { background: #d63031; }

    .arrow {
        font-size: 28px;
        color: #555;
        margin: 0 5px;
    }

    button {
        margin-top: 40px;
        padding: 12px 25px;
        font-size: 16px;
        background: #2d98da;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #1b7dc4;
    }

    .result {
        margin-top: 30px;
        font-size: 22px;
        font-weight: bold;
    }

    .path {
        margin-top: 20px;
        font-size: 16px;
        color: #444;
    }
</style>
</head>

<body>

<h1>Recruitment Process Flowchart</h1>

<div class="flowchart">

    <div class="step">
        <div class="box hr">HR Planning</div>
        <div class="arrow">➡️</div>
    </div>

    <div class="step">
        <div class="box job">Job Posting</div>
        <div class="arrow">➡️</div>
    </div>

    <div class="step">
        <div class="box candidate">Candidates Apply</div>
        <div class="arrow">➡️</div>
    </div>

    <div class="step">
        <div class="box application">Application Review</div>
        <div class="arrow">➡️</div>
    </div>

    <div class="step">
        <div class="box screening">Screening</div>
        <div class="arrow">➡️</div>
    </div>

    <div class="step">
        <div class="box interview">Interview</div>
        <div class="arrow">➡️</div>
    </div>

    <div class="step">
        <div class="box offer">Offer</div>
    </div>

</div>

<button onclick="runProcess()">Run Simulation</button>

<div class="result" id="result"></div>
<div class="path" id="path"></div>

<script>
function runProcess() {
    const result = document.getElementById("result");
    const path = document.getElementById("path");

    let steps = [
        "HR Planning",
        "Job Posting",
        "Application Received",
        "Application Review",
        "Screening",
        "Interview"
    ];

    let progress = steps.join(" ➡️ ");

    let random = Math.random();

    if (random > 0.6) {
        result.innerHTML = "🎉 Candidate HIRED!";
        result.style.color = "green";
        path.innerHTML = progress + " ➡️ Offer Accepted";
    } else if (random > 0.3) {
        result.innerHTML = "⚠️ Candidate Reached Interview but Not Selected";
        result.style.color = "orange";
        path.innerHTML = progress + " ➡️ Rejected after Interview";
    } else {
        result.innerHTML = "❌ Candidate Rejected During Screening";
        result.style.color = "red";
        path.innerHTML = progress + " ➡️ Rejected at Screening";
    }
}
</script>

</body>
</html>
